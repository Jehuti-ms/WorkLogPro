<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - WorkLog Pro</title>
    <link rel="stylesheet" href="styles.css">
    <style>
        .auth-container {
            max-width: 400px;
            margin: 100px auto;
            padding: 30px;
            background: #1e293b;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.3);
        }
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; color: #f8fafc; }
        input { 
            width: 100%; 
            padding: 10px; 
            border-radius: 6px; 
            border: 1px solid #475569; 
            background: #0f172a; 
            color: white; 
            box-sizing: border-box;
        }
        button { 
            width: 100%; 
            padding: 12px; 
            background: #3b82f6; 
            color: white; 
            border: none; 
            border-radius: 6px; 
            cursor: pointer; 
            font-size: 16px;
        }
        button:hover { background: #2563eb; }
        .auth-switch { text-align: center; margin-top: 15px; color: #94a3b8; }
        .auth-switch a { color: #60a5fa; text-decoration: none; cursor: pointer; }
        .error-message { color: #ef4444; margin-bottom: 15px; text-align: center; padding: 8px; background: rgba(239,68,68,0.1); border-radius: 6px; display: none; }
        .logo { text-align: center; margin-bottom: 30px; }
        .logo h1 { color: white; margin-bottom: 5px; }
        .logo p { color: #94a3b8; }
        body { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); min-height: 100vh; margin: 0; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; }
    </style>
</head>
<body>
    <div class="auth-container">
        <div class="logo">
            <h1>WorkLog Pro</h1>
            <p>Teacher's Productivity Companion</p>
        </div>
        <div id="error-message" class="error-message"></div>
        
        <form id="login-form">
            <div class="form-group">
                <label>Email</label>
                <input type="email" id="login-email" required>
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" id="login-password" required>
            </div>
            <button type="submit">Sign In</button>
        </form>

        <form id="signup-form" style="display:none;">
            <div class="form-group">
                <label>Email</label>
                <input type="email" id="signup-email" required>
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" id="signup-password" required minlength="6">
            </div>
            <div class="form-group">
                <label>Display Name</label>
                <input type="text" id="signup-name" required>
            </div>
            <button type="submit">Create Account</button>
        </form>

        <div class="auth-switch">
            <span id="switch-text">Don't have an account?</span>
            <a id="switch-button">Sign up</a>
        </div>
    </div>

    <!-- Load Firebase SDKs -->
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-firestore.js"></script>
    
    <!-- Your Firebase config -->
    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyDdLP_LgiC6EgzC3hUP_mGuNW4_BUEACs8",
            authDomain: "worklogpro-4284e.firebaseapp.com",
            projectId: "worklogpro-4284e",
            storageBucket: "worklogpro-4284e.firebasestorage.app",
            messagingSenderId: "299567233913",
            appId: "1:299567233913:web:7232a5a5a8aa9b79948da8"
        };
        
        // Initialize Firebase if not already
        if (!firebase.apps.length) {
            firebase.initializeApp(firebaseConfig);
        }
        
        const auth = firebase.auth();
    </script>
    
    <!-- Login script -->
    <script>
        const loginForm = document.getElementById('login-form');
        const signupForm = document.getElementById('signup-form');
        const switchBtn = document.getElementById('switch-button');
        const switchText = document.getElementById('switch-text');
        const errorDiv = document.getElementById('error-message');
        let isLogin = true;

        switchBtn.addEventListener('click', (e) => {
            e.preventDefault();
            isLogin = !isLogin;
            if (isLogin) {
                loginForm.style.display = 'block';
                signupForm.style.display = 'none';
                switchText.textContent = "Don't have an account?";
                switchBtn.textContent = "Sign up";
            } else {
                loginForm.style.display = 'none';
                signupForm.style.display = 'block';
                switchText.textContent = "Already have an account?";
                switchBtn.textContent = "Sign in";
            }
            errorDiv.style.display = 'none';
        });

        loginForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('login-email').value;
            const password = document.getElementById('login-password').value;
            
            try {
                await auth.signInWithEmailAndPassword(email, password);
                window.location.href = 'index.html';
            } catch (error) {
                errorDiv.textContent = error.message;
                errorDiv.style.display = 'block';
            }
        });

        signupForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('signup-email').value;
            const password = document.getElementById('signup-password').value;
            const name = document.getElementById('signup-name').value;
            
            try {
                const result = await auth.createUserWithEmailAndPassword(email, password);
                await result.user.updateProfile({ displayName: name });
                window.location.href = 'index.html';
            } catch (error) {
                errorDiv.textContent = error.message;
                errorDiv.style.display = 'block';
            }
        });
        
        console.log("✅ Auth page loaded");
    </script>
</body>
</html>

<!-- ==================== WORKLOG TAB ==================== -->
    
      <div class="section-header">
        <h2>📝 Worklog</h2>
        <div class="student-stats">
          <span class="stat-badge" id="worklogCount">0</span>
          <span class="stat-divider">|</span>
          <span class="stat-text">Last Entry: <span id="lastWorklogDate">Never</span></span>
        </div>
      </div>

      <div class="form-grid" style="grid-template-columns: 1fr 1fr; gap: 20px; align-items: stretch;">
        
        <!-- LEFT COLUMN - Worklog Form -->
        <div class="section-card" style="display: flex; flex-direction: column;">
          <h3 style="flex-shrink: 0; margin-bottom: 15px;">➕ Log Work</h3>
          
          <div style="flex: 1; overflow-y: auto; padding-right: 5px;">
            <form id="worklogForm">
              <div class="form-group">
                <label>Work Type *</label>
                <div style="display: flex; gap: 20px; margin-top: 5px;">
                  <label style="display: flex; align-items: center; gap: 5px;">
                    <input type="radio" name="workType" value="student" checked onchange="toggleWorkType('student')"> 👤 Student
                  </label>
                  <label style="display: flex; align-items: center; gap: 5px;">
                    <input type="radio" name="workType" value="institution" onchange="toggleWorkType('institution')"> 🏢 Institution
                  </label>
                </div>
              </div>

              <div id="studentSection" class="work-section">
                <div class="form-group">
                  <label for="worklogStudent">Select Student *</label>
                  <select id="worklogStudent" required>
                    <option value="">Select Student</option>
                  </select>
                </div>
              </div>

              <div id="institutionSection" class="work-section" style="display: none;">
                <div class="form-group">
                  <label for="worklogInstitution">Institution Name *</label>
                  <input type="text" id="worklogInstitution" placeholder="e.g., ABC Tutoring Center, XYZ School">
                </div>
                <div class="form-group">
                  <label for="worklogContactPerson">Contact Person</label>
                  <input type="text" id="worklogContactPerson" placeholder="e.g., Mr. Smith">
                </div>
              </div>

              <div class="form-group">
                <label for="worklogPaymentType">Payment Type</label>
                <select id="worklogPaymentType" class="form-control">
                  <option value="hourly">Hourly</option>
                  <option value="session">Per-Session</option>
                  <option value="contract">Contract Work</option>
                  <option value="project">Project Based</option>
                  <option value="consultation">Consultation</option>
                  <option value="other">One-off Job</option>
                </select>
              </div>

              <div class="form-group">
                <label for="worklogDate">Date *</label>
                <input type="date" id="worklogDate" required>
              </div>

              <div class="form-group">
                <label for="worklogSubject">Subject/Area *</label>
                <input type="text" id="worklogSubject" placeholder="e.g., Mathematics, Curriculum Development" required>
              </div>

              <div class="form-group">
                <label for="worklogTopic">Topic/Project *</label>
                <input type="text" id="worklogTopic" placeholder="e.g., Algebra, Lesson Planning" required>
              </div>

              <div class="form-group">
                <label for="worklogDuration">Duration (hours) *</label>
                <input type="number" id="worklogDuration" step="0.5" min="0.5" required>
              </div>

              <div class="form-group">
                <label for="worklogSessions">Number of Sessions *</label>
                <input type="number" id="worklogSessions" min="1" value="1" required>
                <small class="help-text">How many separate sessions/classes on this date</small>
              </div>

              <div class="form-group">
                <label for="worklogRate">Hourly Rate ($) *</label>
                <input type="number" id="worklogRate" step="0.01" min="0" value="25.00" required>
              </div>

              <div class="form-group">
                <label for="worklogDescription">Work Description *</label>
                <textarea id="worklogDescription" rows="4" placeholder="Detailed description of work done..." required></textarea>
              </div>

              <div class="form-group">
                <label for="worklogOutcomes">Outcomes/Achievements</label>
                <textarea id="worklogOutcomes" rows="2" placeholder="What was achieved, progress made..."></textarea>
              </div>

              <div class="form-group">
                <label for="worklogNextSteps">Next Steps/Follow-up</label>
                <textarea id="worklogNextSteps" rows="2" placeholder="What needs to be done next..."></textarea>
              </div>

              <div class="form-group">
                <label for="worklogNotes">Additional Notes</label>
                <textarea id="worklogNotes" rows="2" placeholder="Any other observations..."></textarea>
              </div>
            </form>
          </div>
          
          <div class="form-actions" style="flex-shrink: 0; padding-top: 15px; margin-top: 0; border-top: 1px solid var(--border-light);">
            <button type="submit" form="worklogForm" class="button primary" id="worklogSubmitBtn">💾 Save Worklog</button>
            <button type="button" class="button secondary" onclick="clearWorklogForm()">🗑️ Clear Form</button>
          </div>
        </div>

        <!-- RIGHT COLUMN - Worklog History -->
        <div class="section-card worklog-history-container" style="display: flex; flex-direction: column;">
          <h3 style="flex-shrink: 0; margin-bottom: 15px;">📋 Worklog History</h3>
          
          <div class="worklog-filters" style="flex-shrink: 0; display: flex; gap: 8px; margin-bottom: 15px; flex-wrap: wrap;">
            <select id="worklogFilterType" style="flex: 1; min-width: 100px; padding: 8px; border-radius: 6px; border: 1px solid var(--border);">
              <option value="">All Types</option>
              <option value="student">👤 Students</option>
              <option value="institution">🏢 Institutions</option>
            </select>
            
            <select id="worklogFilterEntity" style="flex: 1.5; padding: 8px; border-radius: 6px; border: 1px solid var(--border);">
              <option value="">All</option>
            </select>
            
            <input type="text" id="worklogSearch" placeholder="🔍 Search..." style="flex: 2; padding: 8px; border-radius: 6px; border: 1px solid var(--border);">
            
            <select id="worklogSortOrder" style="flex: 0.8; padding: 8px; border-radius: 6px; border: 1px solid var(--border);">
              <option value="newest">Newest First</option>
              <option value="oldest">Oldest First</option>
            </select>
          </div>
          
          <div id="worklogContainer" class="worklog-container" style="flex: 1; overflow-y: auto; min-height: 0; padding-right: 8px;">
            <!-- Worklog cards will be injected here -->
          </div>
        </div>
      </div>
    
    <!-- ==================== END WORKLOG TAB ==================== -->

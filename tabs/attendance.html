<!-- ==================== ATTENDANCE TAB ==================== -->
    <div id="attendance" class="tabcontent">
      <div class="section-header">
        <h2>✅ Attendance Tracking</h2>
        <div class="student-stats">
          <span class="stat-badge" id="attendanceCount">0</span>
          <span class="stat-divider">|</span>
          <span class="stat-text">Last Session: <span id="lastSessionDate">Never</span></span>
        </div>
      </div>

      <div class="form-grid">
        <div class="section-card">
          <h3>📅 Quick Attendance</h3>
          <form id="attendanceForm">
            <div class="form-group">
              <label for="attendanceDate">Date *</label>
              <input type="date" id="attendanceDate" name="attendanceDate" required>
            </div>
            <div class="form-group">
              <label for="attendanceSubject">Subject *</label>
              <input type="text" id="attendanceSubject" name="attendanceSubject" required>
            </div>
            <div class="form-group">
              <label for="attendanceTopic">Topic</label>
              <input type="text" id="attendanceTopic" name="attendanceTopic">
            </div>
            
            <div class="form-group">
              <label>Mark Students Present:</label>
              <button type="button" id="selectAllStudentsBtn" class="btn btn-secondary" onclick="selectAllStudents()">Select All</button>
              <div id="attendanceStudents" class="attendance-students-container">
                <p class="empty-message">No students registered. Add students first.</p>
              </div>
            </div>

            <div class="form-group">
              <label for="attendanceNotes">Notes</label>
              <textarea id="attendanceNotes" name="attendanceNotes"></textarea>
            </div>

            <div class="form-actions">
              <button type="submit" class="button primary" id="attendanceSubmitBtn">💾 Save Attendance</button>
              <button type="button" class="button secondary" onclick="clearAttendanceForm()">🗑️ Clear Form</button>
              <button type="button" class="button warning" id="cancelAttendanceBtn" style="display: none;">❌ Cancel Edit</button>
            </div>
          </form>
        </div>

        <div class="section-card">
          <h3>📋 Recent Attendance</h3>
          <div id="attendanceContainer">
            <p class="empty-message">No attendance records yet.</p>
          </div>
        </div>
      </div>
    </div>
    <!-- ==================== END ATTENDANCE TAB ==================== -->
